<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us - Our Lady of Fatima Church</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
  </style>
</head>

<body>
  <!-- Header/Navbar -->
  <header>
    <nav class="navbar">
      <a href="index.html">
        <div class="logo">Our Lady of Fatima Church</div>
      </a>

      <!-- Menu Button (hamburger) -->
      <div class="menu-toggle" id="menu-toggle">
        ☰
      </div>

      <ul class="nav-links" id="nav-links">
        <li><a href="about.html" class="active">About</a></li>
        <li><a href="parish.html">Parish</a></li>
        <li><a href="associations.html">Associations</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Tabs -->
    <div class="about-container">
      <div class="tab-menu">
        <h3>About</h3>
        <button class="tab-link active" data-tab="history">History</button>
        <button class="tab-link" data-tab="mass">Mass Schedule</button>
      </div>

      <div id="history-content" class="tab-content active"></div>

      <div id="mass" class="tab-content"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <h3>Made with ❤️ at OLFC</h3>
  </footer>
  <!-- ...your HTML... -->

  <!-- Script -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const menuToggle = document.getElementById('menu-toggle');   // <div id="menu-toggle">☰</div>
      const navLinks = document.getElementById('nav-links');      // <ul id="nav-links" class="nav-links">...</ul>
      const navbar = document.querySelector('.navbar');

      if (!menuToggle || !navLinks) {
        console.warn('Missing #menu-toggle or #nav-links in the HTML.');
        return;
      }

      menuToggle.addEventListener('click', () => {
        // Support either CSS pattern:
        navLinks.classList.toggle('active');   // .nav-links.active { display:flex }
        navbar.classList.toggle('active');     // .navbar.active .nav-links { display:flex }

        console.log('Menu btn clicked >>>>', menuToggle);
        console.log('Nav Links >>>>>', navLinks);
      });
    });
    document.querySelectorAll('.tab-link').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // Mobile nav toggle
    const menuToggle = document.getElementById('menu-toggle');
    const navLinks = document.getElementById('nav-links');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });
  </script>
  <script src="script/about_content.js"></script>
</body>

</html>
